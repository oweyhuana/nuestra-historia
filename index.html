<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(#ff9acb,#ffd6e8);
    color:white;
    text-align:center;
}

header{
    padding:50px 20px;
}

h1{
    font-size:3em;
}

p{
    font-size:1.2em;
}

.contador{
    margin:30px auto;
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,.2);
    padding:20px;
    border-radius:20px;
    font-size:2em;
}

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.galeria img{
    width:100%;
    border-radius:20px;
}

footer{
    padding:40px;
    font-size:1.1em;
}
</style>

</head>

<body>

<header>
<h1>Ricardo ❤️ Nicolh</h1>

<p>Desde el 2 de junio comenzó la historia más bonita de mi vida.</p>

<div class="contador" id="contador"></div>

</header>

<section class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">

</section>

<footer>

<h2>Te amo muchísimo ❤️</h2>

<p>
Gracias por llegar a mi vida.
Cada segundo contigo vale la pena y deseo que esta historia nunca tenga final.
</p>

</footer>

<script>

const fechaInicio = new Date("2026-06-02T00:00:00");

function actualizar(){

const ahora = new Date();

const diferencia = ahora-fechaInicio;

const dias=Math.floor(diferencia/(1000*60*60*24));

const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

const minutos=Math.floor((diferencia%(1000*60*60))/60000);

const segundos=Math.floor((diferencia%(60000))/1000);

document.getElementById("contador").innerHTML=
`${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos juntos ❤️`;

}

setInterval(actualizar,1000);

actualizar();

</script>

</body>
</html>
